name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install stapel-core
        run: pip install git+https://github.com/usestapel/stapel-core.git

      - name: Install
        run: pip install -e ".[all]" || pip install -e .

      - name: Lint
        run: |
          pip install ruff --quiet
          ruff check . --select E,F,W --ignore E501

      - name: migration-lint (expand/contract gate, release-management.md §3)
        run: |
          pip install "stapel-tools>=0.9.1,<1" --quiet
          stapel-migration-lint . --strict

      - name: Import check
        run: python -c "import stapel_workspaces; print('import OK')"

      - name: Install test dependencies
        run: pip install pytest pytest-django pytest-cov "stapel-tools>=0.9.1,<1"

      - name: Tests with coverage
        run: |
          pytest tests/ \
            --cov=stapel_workspaces \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=junit.xml \
            -o junit_family=legacy \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ !cancelled() }}
        continue-on-error: true
        with:
          files: coverage.xml
          flags: stapel-workspaces
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        uses: codecov/test-results-action@v1
        if: ${{ !cancelled() }}
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  release-track:
    # Release gate — library-standard §7.4. Installs the package the way an end
    # user does: dependencies (incl. stapel-core) resolved from PyPI strictly by
    # the declared pins — no git-main core, no editable siblings. Catches "pin
    # into the void" and drift between the core branch and the published wheel.
    # Blocking (library-standard §7.5): the stapel dependency graph is now fully
    # on PyPI, so a green run here is a precondition for a vX.Y.Z tag.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install as an end user (deps resolved from PyPI by pin)
        run: pip install .
      - name: Verify stapel-core resolved from PyPI satisfies the declared pin
        # Reads the range straight out of pyproject.toml instead of a hardcoded
        # tuple — the previous hardcoded `==(0,8)`/`==(0,10)` silently went stale
        # (and failed every run) each time the pin was bumped, because nobody
        # remembered to update this step in step with the dependency line.
        run: |
          cd "$RUNNER_TEMP" && python -c "
          import importlib.metadata as m
          import re
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path('$GITHUB_WORKSPACE/pyproject.toml').read_text())
          dep = next(d for d in pyproject['project']['dependencies'] if d.startswith('stapel-core'))
          floor_s, ceil_s = re.search(r'>=([\d.]+),<([\d.]+)', dep).groups()
          floor = tuple(map(int, floor_s.split('.')))
          ceil = tuple(map(int, ceil_s.split('.')))
          v = m.version('stapel-core')
          got = tuple(map(int, v.split('.')[:len(floor)]))
          print(f'stapel-core {v} against {dep!r}')
          assert floor <= got < ceil, f'{v} outside declared range {dep!r}'
          "
      - name: Import smoke (installed package, from a clean dir)
        run: cd "$RUNNER_TEMP" && python -c "import stapel_workspaces; print('release-track import OK')"
