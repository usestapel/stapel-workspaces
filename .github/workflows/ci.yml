name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[all]" 2>/dev/null || pip install -e .
      - name: Lint
        run: |
          pip install ruff --quiet
          ruff check . --select E,F,W --ignore E501
      - name: Import check
        run: python -c "import $(basename $(pwd)); print('OK')"
