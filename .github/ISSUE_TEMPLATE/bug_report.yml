name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Settings + the smallest snippet or request that triggers it.
      render: python
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      placeholder: "stapel-workspaces X.Y.Z, Django A.B, Python C.D"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Traceback / logs
      render: text
