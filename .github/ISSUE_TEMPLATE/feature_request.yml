name: Feature request
description: Propose an improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today without forking?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: Sketch the settings key / hook / call you'd like to exist.
      render: python
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
